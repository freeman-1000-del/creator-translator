<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HumaLation 번역 테스트</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto;padding:20px;background:#f5f5f5;}
h1{color:#333;text-align:center;}
label{font-weight:bold;color:#444;display:block;margin-top:12px;}
input,textarea{width:100%;padding:10px;margin:4px 0;border:1px solid #ddd;border-radius:4px;font-size:14px;box-sizing:border-box;}
button{background:#C9A84C;color:white;padding:14px;border:none;border-radius:4px;font-size:16px;cursor:pointer;width:100%;margin-top:16px;}
button:hover{background:#a88a3d;}
button:disabled{background:#ccc;cursor:not-allowed;}
.btn2{background:#1565C0;}
.btn2:hover{background:#0d47a1;}
#progress-box{background:white;border:1px solid #ddd;border-radius:4px;padding:15px;margin:12px 0;display:none;}
#progress-bar-wrap{background:#eee;border-radius:10px;height:24px;margin:8px 0;overflow:hidden;}
#progress-bar{background:linear-gradient(90deg,#4CAF50,#81C784);height:24px;border-radius:10px;width:0%;transition:width 0.5s ease;}
#progress-text{text-align:center;font-size:14px;color:#333;font-weight:bold;margin-top:8px;}
#timer{text-align:center;font-size:13px;color:#888;margin-top:4px;}
#summary{background:#e8f5e9;border:1px solid #4CAF50;border-radius:4px;padding:15px;margin:10px 0;display:none;font-size:14px;}
#summary2{background:#e3f2fd;border:1px solid #1565C0;border-radius:4px;padding:15px;margin:10px 0;display:none;font-size:14px;}
#summary-final{background:#fff8e1;border:1px solid #C9A84C;border-radius:4px;padding:15px;margin:10px 0;display:none;font-size:15px;font-weight:bold;}
.result{background:white;border:1px solid #ddd;border-radius:4px;padding:12px;margin:6px 0;border-left:4px solid #4CAF50;}
.result h3{margin:0 0 6px 0;color:#333;font-size:13px;}
.result p{margin:3px 0;color:#555;font-size:12px;}
.failed-box{background:#fff3f3;border:1px solid #ffcccc;border-radius:4px;padding:12px;margin:6px 0;font-size:13px;}
.keywords{color:#1565C0;font-weight:bold;}
.key-box{background:#fffde7;border:1px solid #ffe082;border-radius:4px;padding:12px;margin-bottom:8px;}
.warn{color:#e65100;font-size:12px;font-weight:normal;}
</style>
</head>
<body>
<h1>🌍 HumaLation 번역 테스트</h1>

<label>YouTube 제목</label>
<input type="text" id="title" placeholder="예: 피아노 힐링 음악 1시간">

<label>YouTube 설명문 <span class="warn">⚠ 100자 초과시 번역을 두 번으로 나누어 하셔야 오류가 없습니다 (현존 전세계 시스템의 글자 제한 때문)</span></label>
<textarea id="description" rows="4" placeholder="예: 편안한 피아노 음악으로 하루의 피로를 풀어보세요"></textarea>
<div style="text-align:right;font-size:12px;color:#888;">글자수: <span id="desc-count">0</span></div>

<label>키워드 (쉼표로 구분)</label>
<input type="text" id="keywords" placeholder="예: 힐링, 피아노, 음악, 수면, 휴식">

<div class="key-box">
<label>🔑 OpenAI API Key</label>
<input type="password" id="openai-key" placeholder="sk-...">
</div>
<button id="btn1" onclick="translate1()">🚀 70개국 번역 시작</button>  
<button id="btn1" onclick="translate1()">🚀 70개국 맥락번역 시작</button>
<button id="btn2" class="btn2" onclick="translate2()" style="display:none;">📝 2회 번역 — 설명문 (100자 초과)</button>

<div id="summary"></div>
<div id="summary2"></div>

<div id="progress-box">
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-text">번역 준비 중...</div>
  <div id="timer">0초 경과</div>
</div>

<div id="summary-final"></div>
<div id="results"></div>

<script>
const LANGS = [
  {code:'af',name:'Afrikaans'},{code:'sq',name:'Albanian'},{code:'ar',name:'Arabic'},
  {code:'hy',name:'Armenian'},{code:'az',name:'Azerbaijani'},{code:'bn',name:'Bengali'},
  {code:'bs',name:'Bosnian'},{code:'bg',name:'Bulgarian'},{code:'ca',name:'Catalan'},
  {code:'zh-Hans',name:'Chinese Simplified'},{code:'zh-Hant',name:'Chinese Traditional'},
  {code:'hr',name:'Croatian'},{code:'cs',name:'Czech'},{code:'da',name:'Danish'},
  {code:'nl',name:'Dutch'},{code:'en',name:'English'},{code:'et',name:'Estonian'},
  {code:'fi',name:'Finnish'},{code:'fr',name:'French'},{code:'ka',name:'Georgian'},
  {code:'de',name:'German'},{code:'el',name:'Greek'},{code:'gu',name:'Gujarati'},
  {code:'he',name:'Hebrew'},{code:'hi',name:'Hindi'},{code:'hu',name:'Hungarian'},
  {code:'is',name:'Icelandic'},{code:'id',name:'Indonesian'},{code:'it',name:'Italian'},
  {code:'ja',name:'Japanese'},{code:'kn',name:'Kannada'},{code:'kk',name:'Kazakh'},
  {code:'km',name:'Khmer'},{code:'ko',name:'Korean'},{code:'lo',name:'Lao'},
  {code:'lv',name:'Latvian'},{code:'lt',name:'Lithuanian'},{code:'mk',name:'Macedonian'},
  {code:'ms',name:'Malay'},{code:'ml',name:'Malayalam'},{code:'mt',name:'Maltese'},
  {code:'mn',name:'Mongolian'},{code:'ne',name:'Nepali'},{code:'nb',name:'Norwegian'},
  {code:'ps',name:'Pashto'},{code:'fa',name:'Persian'},{code:'pl',name:'Polish'},
  {code:'pt',name:'Portuguese'},{code:'pa',name:'Punjabi'},{code:'ro',name:'Romanian'},
  {code:'ru',name:'Russian'},{code:'sr',name:'Serbian'},{code:'si',name:'Sinhala'},
  {code:'sk',name:'Slovak'},{code:'sl',name:'Slovenian'},{code:'so',name:'Somali'},
  {code:'es',name:'Spanish'},{code:'sw',name:'Swahili'},{code:'sv',name:'Swedish'},
  {code:'tl',name:'Filipino'},{code:'ta',name:'Tamil'},{code:'te',name:'Telugu'},
  {code:'th',name:'Thai'},{code:'tr',name:'Turkish'},{code:'uk',name:'Ukrainian'},
  {code:'ur',name:'Urdu'},{code:'uz',name:'Uzbek'},{code:'vi',name:'Vietnamese'},
  {code:'cy',name:'Welsh'},{code:'zu',name:'Zulu'}
];

let timerInterval = null;
let results1 = {};
let results2 = {};

// 설명문 글자수 감지 → 버튼 표시/숨김
document.getElementById('description').addEventListener('input', function() {
  const len = this.value.length;
  document.getElementById('desc-count').textContent = len;
  document.getElementById('btn2').style.display = len > 100 ? 'block' : 'none';
});

function startTimer() {
  const startTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    document.getElementById('timer').textContent = ((Date.now() - startTime) / 1000).toFixed(1) + '초 경과';
  }, 100);
  return startTime;
}

async function runBatches(payload, progressLabel) {
  const BATCH_SIZE = 15;
  const batches = [];
  for (let i = 0; i < LANGS.length; i += BATCH_SIZE) batches.push(LANGS.slice(i, i + BATCH_SIZE));
  const allResults = {};
  const allFailed = [];
  for (let i = 0; i < batches.length; i++) {
    document.getElementById('progress-bar').style.width = Math.round((i / batches.length) * 100) + '%';
    document.getElementById('progress-text').textContent = progressLabel + ' ' + (i * BATCH_SIZE) + ' / ' + LANGS.length + '개 완료';
    try {
      const res = await fetch('/api/translate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({...payload, languages: batches[i]})
      });
      const data = await res.json();
      if (data.translations) Object.assign(allResults, data.translations);
      if (data.failed) allFailed.push(...data.failed);
    } catch(e) { console.error('배치 오류:', e); }
  }
  return { allResults, allFailed };
}

async function translate1() {
  const openai_key = document.getElementById('openai-key').value.trim();
  const title = document.getElementById('title').value.trim();
  const description = document.getElementById('description').value.trim();
  const keywordsRaw = document.getElementById('keywords').value.trim();
  if (!openai_key || !openai_key.startsWith('sk-')) { alert('OpenAI API Key를 입력하세요'); return; }
  if (!title) { alert('제목을 입력하세요'); return; }
  const keywords = keywordsRaw ? keywordsRaw.split(',').map(k => '#' + k.trim()).join(' ') : '';
  const desc = description.length > 100 ? '' : description;

  document.getElementById('btn1').disabled = true;
  document.getElementById('btn2').disabled = true;
  document.getElementById('progress-box').style.display = 'block';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('results').innerHTML = '';
  document.getElementById('summary-final').style.display = 'none';

  const startTime = startTimer();
  const { allResults, allFailed } = await runBatches({ title, description: desc, keywords, openai_key }, '번역 중...');
  results1 = allResults;

  clearInterval(timerInterval);
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = '✅ 1회 번역 완료!';
  document.getElementById('timer').textContent = '소요시간: ' + elapsed + '초';

  const s = document.getElementById('summary');
  s.style.display = 'block';
  s.innerHTML = '✅ 1회 완료 — 성공: <strong>' + Object.keys(results1).length + '개</strong> | 실패: <strong>' + allFailed.length + '개</strong> | ⏱ ' + elapsed + '초';

  document.getElementById('btn1').disabled = false;
  document.getElementById('btn2').disabled = false;
  showFinal();
}

async function translate2() {
  const openai_key = document.getElementById('openai-key').value.trim();
  const title = document.getElementById('title').value.trim();
  const description = document.getElementById('description').value.trim();
  if (!openai_key || !openai_key.startsWith('sk-')) { alert('OpenAI API Key를 입력하세요'); return; }
  if (!description) { alert('설명문을 입력하세요'); return; }

  document.getElementById('btn1').disabled = true;
  document.getElementById('btn2').disabled = true;
  document.getElementById('progress-box').style.display = 'block';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('summary-final').style.display = 'none';

  const startTime = startTimer();
  const { allResults, allFailed } = await runBatches({ title, description, keywords: '', openai_key }, '설명문 번역 중...');
  results2 = allResults;

  clearInterval(timerInterval);
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = '✅ 2회 번역 완료!';
  document.getElementById('timer').textContent = '소요시간: ' + elapsed + '초';

  const s = document.getElementById('summary2');
  s.style.display = 'block';
  s.innerHTML = '✅ 2회 완료 — 성공: <strong>' + Object.keys(results2).length + '개</strong> | 실패: <strong>' + allFailed.length + '개</strong> | ⏱ ' + elapsed + '초';

  document.getElementById('btn1').disabled = false;
  document.getElementById('btn2').disabled = false;
  showFinal();
}

function showFinal() {
  if (Object.keys(results1).length === 0) return;
  const final = {};
  LANGS.forEach(lang => {
    const r1 = results1[lang.code];
    const r2 = results2[lang.code];
    if (r1) {
      final[lang.code] = {
        title: r1.title,
        description: r2 ? r2.description : (r1.description || ''),
        keywords: r1.keywords || ''
      };
    }
  });

  const sf = document.getElementById('summary-final');
  sf.style.display = 'block';
  sf.innerHTML = '🌍 최종 합산 — 총 <strong>' + Object.keys(final).length + '개국</strong> 번역 완료';

  let html = '';
  for (const lang of LANGS) {
    const t = final[lang.code];
    if (t) {
      html += '<div class="result"><h3>✅ ' + lang.name + ' (' + lang.code + ')</h3>' +
        '<p><strong>제목:</strong> ' + t.title + '</p>' +
        (t.description ? '<p><strong>설명:</strong> ' + t.description + '</p>' : '') +
        (t.keywords ? '<p class="keywords">' + t.keywords + '</p>' : '') +
        '</div>';
    }
  }
  document.getElementById('results').innerHTML = html;
}
</script>
</body>
</html>
