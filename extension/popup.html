<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:320px;font-family:-apple-system,sans-serif;background:#f8f9fa;}
.header{background:#0f2744;color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;}
.header .logo{font-size:22px;}
.header h1{font-size:14px;font-weight:700;line-height:1.3;}
.header span{font-size:11px;opacity:0.7;display:block;}
.section{padding:14px 16px;border-bottom:1px solid #eee;}
.section-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px;}
.status{font-size:13px;color:#333;background:white;border:1px solid #e0e0e0;border-radius:8px;padding:10px 12px;}
.status.ready{border-color:#34a853;background:#f0fff4;color:#1a6b3c;}
.status.empty{color:#999;}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-primary{background:#FF0000;color:white;}
.btn-primary:hover{background:#cc0000;}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;}
.btn-secondary{background:#0f2744;color:white;margin-top:6px;}
.btn-secondary:hover{background:#1a3a5c;}
.result-count{font-size:12px;color:#666;margin-top:6px;text-align:center;}
.log{background:#1a1a1a;color:#00ff88;font-size:11px;padding:10px;border-radius:6px;max-height:120px;overflow-y:auto;font-family:monospace;margin-top:8px;display:none;}
.log.show{display:block;}
.footer{padding:10px 16px;font-size:11px;color:#aaa;text-align:center;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">🌐</div>
  <h1>70개국 자동 맥락번역기<span>YouTube Studio 자동 등록</span></h1>
</div>

<div class="section">
  <div class="section-title">번역 결과 상태</div>
  <div class="status" id="status-display">
    번역기에서 번역을 먼저 실행해주세요
  </div>
</div>

<div class="section">
  <div class="section-title">YouTube Studio 자동 등록</div>
  <input type="text" id="video-url" placeholder="YouTube 영상 URL 입력" 
    style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:8px;">
  <button class="btn btn-primary" id="btn-register" disabled>
    ▶ YouTube Studio 자동 등록
  </button>
  <div class="result-count" id="result-count"></div>
  <div class="log" id="log"></div>
</div>

<div class="section">
  <button class="btn btn-secondary" id="btn-open-translator">
    🌐 번역기 열기
  </button>
</div>

<div class="footer">번역기에서 번역 완료 후 이 버튼을 클릭하세요</div>

<script src="popup.js"></script>
</body>
</html>
