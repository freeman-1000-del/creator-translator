<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Context Translator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:20px}
.app{max-width:980px;margin:0 auto}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.logo{width:42px;height:42px;background:#0f2744;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px}
.h1{font-size:20px;font-weight:700}
.h1 span{font-size:13px;font-weight:400;color:#888;margin-left:6px}
.ptabs{display:flex;gap:8px;margin-bottom:16px}
.ptab{padding:8px 22px;border-radius:24px;border:1px solid #ddd;font-size:13px;cursor:pointer;font-weight:600;color:#666;background:#f5f5f5}
.ptab.yt.on{background:#FF0000;color:white;border-color:#FF0000}
.ptab.tt.on{background:#111;color:white;border-color:#111}
.ptab.ig.on{background:#C13584;color:white;border-color:#C13584}
.card{background:white;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:14px}
.clabel{font-size:12px;font-weight:700;color:#555;margin-bottom:8px}
.url-row{display:flex;gap:8px}
.url-row input{flex:1}
.url-tag{padding:9px 14px;background:#f5f5f5;color:#aaa;border:1px solid #e5e5e5;border-radius:8px;font-size:11px;white-space:nowrap}
input[type=text],textarea{width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:10px 13px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fafafa;outline:none}
input:focus,textarea:focus{border-color:#0f2744;background:white}
textarea{resize:vertical}
.yt-bar{background:white;border:1px solid #e5e5e5;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.yt-bar-info{font-size:13px;color:#555}
.yt-bar-info strong{color:#1a1a1a}
.yt-connected{display:flex;align-items:center;gap:8px;font-size:13px;color:#0a3622;font-weight:600}
.yt-dot{width:8px;height:8px;border-radius:50%;background:#34a853}
.btn-yt{padding:9px 20px;background:#FF0000;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-yt:hover{background:#cc0000}
.btn-yt.out{background:#f5f5f5;color:#666;border:1px solid #e5e5e5}
.btn-go{width:100%;padding:15px;background:#0f2744;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.btn-go:hover{background:#163860}
.btn-go:disabled{opacity:.5;cursor:not-allowed}
.btn-apply{width:100%;padding:13px;background:#34a853;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.btn-apply:hover{background:#2d9248}
.btn-apply:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.confirm-box{background:#fff3cd;border:1px solid #ffe69c;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:none}
.confirm-box p{font-size:13px;color:#664d03;margin-bottom:10px}
.confirm-btns{display:flex;gap:8px}
.cbtn-yes{padding:8px 22px;background:#0f2744;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.cbtn-no{padding:8px 22px;background:transparent;color:#666;border:1px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer}
.progress-area{display:none;margin-bottom:14px;background:white;border:1px solid #e5e5e5;border-radius:12px;padding:16px}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.progress-label{font-size:13px;color:#555;flex:1}
.timer-big{font-size:22px;font-weight:700;color:#0f2744}
.progress-bar-wrap{height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-bar-fill{height:7px;border-radius:4px;transition:width .15s}
.bar-google{background:#34a853}
.bar-claude{background:#0f2744}
.bar-apply{background:#FF0000}
.step-labels{display:flex;gap:12px;font-size:11px;color:#999}
.step-label{display:flex;align-items:center;gap:4px}
.step-dot{width:8px;height:8px;border-radius:50%}
.status-box{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:14px;font-weight:500;display:none}
.status-box.ok{background:#d1e7dd;color:#0a3622}
.status-box.err{background:#f8d7da;color:#58151c}
.results-header{font-size:15px;font-weight:700;margin-bottom:10px}
.results-grid{display:grid;gap:7px}
.lang-row{background:white;border:1px solid #e5e5e5;border-radius:10px;padding:13px 16px;display:grid;grid-template-columns:148px 1fr auto;gap:14px;align-items:start}
.lang-name{font-size:12px;font-weight:700;color:#555;display:flex;align-items:center;gap:7px;padding-top:2px}
.lang-flag{font-size:17px}
.lang-content{display:flex;flex-direction:column;gap:5px}
.lang-title{font-size:14px;font-weight:700;color:#1a1a1a;line-height:1.4}
.lang-title-alt{font-size:12px;color:#888}
.lang-desc{font-size:12px;color:#555;line-height:1.55;word-break:break-word}
.lang-kw{font-size:11px;color:#aaa;line-height:1.7;padding:5px 8px;background:#f8f8f8;border-radius:6px;margin-top:2px}
.lang-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.lang-tag{font-size:11px;padding:2px 9px;border-radius:12px;background:#f0f4ff;color:#3a5bd0;border:1px solid #d0d8ff}
.copy-btn{font-size:11px;padding:5px 11px;background:#f5f5f5;border:1px solid #e5e5e5;border-radius:8px;color:#666;cursor:pointer;white-space:nowrap}
.copy-btn:hover{background:#e8e8e8}
.spin-sm{width:13px;height:13px;border:2px solid #ccc;border-top-color:#0f2744;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.ctx-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#e8f4fd;color:#0f6cbf;border:1px solid #b3d9f5;margin-left:6px;font-weight:600}
.ok-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#d1e7dd;color:#0a3622;border:1px solid #a3cfbb;margin-left:4px;font-weight:600;display:none}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">🌐</div>
  <div><div class="h1">Creator Context Translator <span>70개국 · 구글번역 + AI 맥락 최적화</span></div></div>
</div>
<div class="ptabs">
  <div class="ptab yt on" onclick="setPlatform('yt',this)">▶ YouTube</div>
  <div class="ptab tt" onclick="setPlatform('tt',this)">♪ TikTok</div>
  <div class="ptab ig" onclick="setPlatform('ig',this)">◎ Instagram</div>
</div>
<div class="yt-bar">
  <div class="yt-bar-info" id="yt-info"><strong>YouTube 자동 적용</strong> — 로그인하면 번역 결과가 자막탭에 자동 등록됩니다</div>
  <button class="btn-yt" id="btn-yt-login" onclick="loginYT()">▶ YouTube 로그인</button>
</div>
<div class="card">
  <div class="clabel">URL</div>
  <div class="url-row">
    <input type="text" id="inp-url" placeholder="https://www.youtube.com/watch?v=...">
    <div class="url-tag">자동연동 준비중</div>
  </div>
</div>
<div class="card">
  <div class="clabel">영상 제목</div>
  <input type="text" id="inp-title" placeholder="영상 제목을 복사하여 여기에 붙여 넣으세요.">
</div>
<div class="card">
  <div class="clabel">설명문</div>
  <textarea id="inp-desc" rows="5" placeholder="영상 하단의 설명문을 복사하여 여기에 붙여 넣으세요."></textarea>
</div>
<div class="confirm-box" id="confirm-box">
  <p>설명문이 없습니다. 계속 진행하시겠습니까?<br><small style="color:#856404">설명문 없이 진행하면 제목만 번역됩니다.</small></p>
  <div class="confirm-btns">
    <button class="cbtn-yes" onclick="startTranslate(true)">예, 진행합니다</button>
    <button class="cbtn-no" onclick="hideConfirm()">아니오, 설명문 입력</button>
  </div>
</div>
<button class="btn-go" id="btn-go"><span id="btn-lbl">70개국 동시 번역 실행</span></button>
<button class="btn-apply" id="btn-apply" onclick="applyYT()"><span id="apply-lbl">▶ YouTube 자막탭 자동 등록</span></button>
<div class="progress-area" id="progress-area">
  <div class="progress-row">
    <div class="spin-sm"></div>
    <span class="progress-label" id="prog-text">번역 준비 중...</span>
    <span class="timer-big" id="timer">0.0초</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill bar-google" id="progress-bar" style="width:0%"></div></div>
  <div class="step-labels">
    <div class="step-label"><div class="step-dot" style="background:#34a853"></div>구글 번역</div>
    <div class="step-label"><div class="step-dot" style="background:#0f2744"></div>AI 맥락 최적화</div>
    <div class="step-label"><div class="step-dot" style="background:#FF0000"></div>YouTube 자동 등록</div>
  </div>
</div>
<div class="status-box" id="status-box"></div>
<div id="results" style="display:none">
  <div class="results-header" id="results-title">번역 결과</div>
  <div class="results-grid" id="results-grid"></div>
</div>
</div>
<script>
const GK="AIzaSyDbmScuw7OWmolYKMpVwQnF3mOJVgHC1Bc";
const CID="814006479687-1rk3j7p24e2p7k4nliiu8viu5bkf517g.apps.googleusercontent.com";
const LANGS=[
  {c:"en",n:"English (US)",f:"🇺🇸"},{c:"fr",n:"Français",f:"🇫🇷"},{c:"de",n:"Deutsch",f:"🇩🇪"},
  {c:"es",n:"Español",f:"🇪🇸"},{c:"it",n:"Italiano",f:"🇮🇹"},{c:"pt",n:"Português (BR)",f:"🇧🇷"},
  {c:"ru",n:"Русский",f:"🇷🇺"},{c:"nl",n:"Nederlands",f:"🇳🇱"},{c:"pl",n:"Polski",f:"🇵🇱"},
  {c:"sv",n:"Svenska",f:"🇸🇪"},{c:"is",n:"Íslenska",f:"🇮🇸"},{c:"da",n:"Dansk",f:"🇩🇰"},
  {c:"fi",n:"Suomi",f:"🇫🇮"},{c:"el",n:"Ελληνικά",f:"🇬🇷"},{c:"cs",n:"Čeština",f:"🇨🇿"},
  {c:"sk",n:"Slovenčina",f:"🇸🇰"},{c:"hu",n:"Magyar",f:"🇭🇺"},{c:"ro",n:"Română",f:"🇷🇴"},
  {c:"bg",n:"Български",f:"🇧🇬"},{c:"hr",n:"Hrvatski",f:"🇭🇷"},{c:"sr",n:"Srpski",f:"🇷🇸"},
  {c:"uk",n:"Українська",f:"🇺🇦"},{c:"sq",n:"Shqip",f:"🇦🇱"},{c:"et",n:"Eesti",f:"🇪🇪"},
  {c:"lv",n:"Latviešu",f:"🇱🇻"},{c:"lt",n:"Lietuvių",f:"🇱🇹"},{c:"ja",n:"日本語",f:"🇯🇵"},
  {c:"zh-CN",n:"中文简体",f:"🇨🇳"},{c:"zh-TW",n:"中文繁體",f:"🇹🇼"},{c:"ar",n:"العربية",f:"🇸🇦"},
  {c:"hi",n:"हिन्दी",f:"🇮🇳"},{c:"tr",n:"Türkçe",f:"🇹🇷"},{c:"vi",n:"Tiếng Việt",f:"🇻🇳"},
  {c:"th",n:"ภาษาไทย",f:"🇹🇭"},{c:"id",n:"Indonesia",f:"🇮🇩"},{c:"ms",n:"Melayu",f:"🇲🇾"},
  {c:"tl",n:"Filipino",f:"🇵🇭"},{c:"bn",n:"বাংলা",f:"🇧🇩"},{c:"ur",n:"اردو",f:"🇵🇰"},
  {c:"fa",n:"فارسی",f:"🇮🇷"},{c:"he",n:"עברית",f:"🇮🇱"},{c:"ta",n:"தமிழ்",f:"🇮🇳"},
  {c:"te",n:"తెలుగు",f:"🇮🇳"},{c:"ml",n:"മലയാളം",f:"🇮🇳"},{c:"kn",n:"ಕನ್ನಡ",f:"🇮🇳"},
  {c:"pa",n:"ਪੰਜਾਬੀ",f:"🇮🇳"},{c:"mn",n:"Монгол",f:"🇲🇳"},{c:"kk",n:"Қазақша",f:"🇰🇿"},
  {c:"uz",n:"Oʻzbek",f:"🇺🇿"},{c:"az",n:"Azərbaycanca",f:"🇦🇿"},{c:"ka",n:"ქართული",f:"🇬🇪"},
  {c:"hy",n:"Հայերեն",f:"🇦🇲"},{c:"my",n:"မြန်မာ",f:"🇲🇲"},{c:"km",n:"ខ្មែរ",f:"🇰🇭"},
  {c:"si",n:"සිංහල",f:"🇱🇰"},{c:"sw",n:"Kiswahili",f:"🇰🇪"},{c:"am",n:"አማርኛ",f:"🇪🇹"},
  {c:"yo",n:"Yorùbá",f:"🇳🇬"},{c:"ha",n:"Hausa",f:"🇳🇬"},{c:"zu",n:"isiZulu",f:"🇿🇦"},
  {c:"ca",n:"Català",f:"🏳️"},{c:"cy",n:"Cymraeg",f:"🏴󠁧󠁢󠁷󠁬󠁳󠁿"},{c:"ga",n:"Gaeilge",f:"🇮🇪"},
  {c:"af",n:"Afrikaans",f:"🇿🇦"},{c:"ne",n:"नेपाली",f:"🇳🇵"},{c:"sl",n:"Slovenščina",f:"🇸🇮"},
  {c:"mk",n:"Македонски",f:"🇲🇰"},{c:"lo",n:"ລາວ",f:"🇱🇦"}
];
const CB=[
  ["en","fr","de","es","it","pt","ru","nl","pl","sv"],
  ["is","da","fi","el","cs","sk","hu","ro","bg","hr"],
  ["sr","uk","sq","et","lv","lt","ja","zh-CN","zh-TW","ar"],
  ["hi","tr","vi","th","id","ms","tl","bn","ur","fa"],
  ["he","ta","te","ml","kn","pa","mn","kk","uz","az"],
  ["ka","hy","my","km","si","sw","am","yo","ha","zu"],
  ["ca","cy","ga","af","ne","sl","mk","lo"]
];

// YouTube가 실제로 지원하는 언어코드 매핑
// YouTube localizations BCP-47 코드 매핑
// nb(노르웨이 Bokmål) → YouTube 거부 확인, no로 변경 테스트
const YT_CODE_MAP={
  "en":"en","fr":"fr","de":"de","es":"es","it":"it",
  "pt":"pt-BR","ru":"ru","nl":"nl","pl":"pl","sv":"sv",
  "no":"is","da":"da","fi":"fi","el":"el","cs":"cs",
  "sk":"sk","hu":"hu","ro":"ro","bg":"bg","hr":"hr",
  "sr":"sr","uk":"uk","sq":"sq","et":"et","lv":"lv",
  "lt":"lt","ja":"ja","zh-CN":"zh-Hans","zh-TW":"zh-Hant",
  "ar":"ar","hi":"hi","tr":"tr","vi":"vi","th":"th",
  "id":"id","ms":"ms","tl":"fil","bn":"bn","ur":"ur",
  "fa":"fa","he":"iw","ta":"ta","te":"te","ml":"ml",
  "kn":"kn","pa":"pa","mn":"mn","kk":"kk","uz":"uz",
  "az":"az","ka":"ka","hy":"hy","my":"my","km":"km",
  "si":"si","sw":"sw","am":"am","yo":"yo","ha":"ha",
  "zu":"zu","ca":"ca","cy":"cy","ga":"ga","af":"af",
  "ne":"ne","sl":"sl","mk":"mk","lo":"lo"
};

let ti=null,AR={},curP="yt",AT=null;

window.addEventListener('load',()=>{
  const p=new URLSearchParams(window.location.search);
  const t=p.get('access_token');
  if(t){AT=t;window.history.replaceState({},'',window.location.pathname);setConnected();}
});

function loginYT(){
  const ru=window.location.origin+"/api/auth/callback";
  const sc="https://www.googleapis.com/auth/youtube.force-ssl";
  window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${CID}&redirect_uri=${encodeURIComponent(ru)}&response_type=code&scope=${encodeURIComponent(sc)}&access_type=offline&prompt=consent`;
}

function setConnected(){
  document.getElementById('yt-info').innerHTML='<div class="yt-connected"><div class="yt-dot"></div>YouTube 연결됨 — 번역 후 자동 등록 가능</div>';
  const b=document.getElementById('btn-yt-login');
  b.textContent='로그아웃';b.classList.add('out');b.onclick=logoutYT;
}

function logoutYT(){
  AT=null;
  document.getElementById('yt-info').innerHTML='<strong>YouTube 자동 적용</strong> — 로그인하면 번역 결과가 자막탭에 자동 등록됩니다';
  const b=document.getElementById('btn-yt-login');
  b.textContent='▶ YouTube 로그인';b.classList.remove('out');b.onclick=loginYT;
  document.getElementById('btn-apply').style.display='none';
}

function setPlatform(p,el){curP=p;document.querySelectorAll(".ptab").forEach(t=>t.classList.remove("on"));el.classList.add("on");}
function hideConfirm(){document.getElementById("confirm-box").style.display="none";document.getElementById("inp-desc").focus();}

document.getElementById("btn-go").addEventListener("click",function(){
  const t=document.getElementById("inp-title").value.trim();
  if(!t){alert("제목을 입력해주세요.");return;}
  const d=document.getElementById("inp-desc").value.trim();
  if(!d){document.getElementById("confirm-box").style.display="block";return;}
  startTranslate(false);
});

async function startTranslate(nd){
  document.getElementById("confirm-box").style.display="none";
  const title=document.getElementById("inp-title").value.trim();
  const desc=nd?"":document.getElementById("inp-desc").value.trim();
  const pname={yt:"YouTube",tt:"TikTok",ig:"Instagram"}[curP];
  const btn=document.getElementById("btn-go");
  btn.disabled=true;document.getElementById("btn-lbl").innerHTML='<div class="spinner"></div>';
  document.getElementById("status-box").style.display="none";
  document.getElementById("results").style.display="none";
  document.getElementById("results-grid").innerHTML="";
  document.getElementById("progress-area").style.display="block";
  document.getElementById("progress-bar").style.width="0%";
  document.getElementById("progress-bar").className="progress-bar-fill bar-google";
  document.getElementById("btn-apply").style.display="none";
  AR={};let el=0;clearInterval(ti);
  ti=setInterval(()=>{el+=0.1;document.getElementById("timer").textContent=el.toFixed(1)+"초";},100);
  const st=Date.now();
  const texts=desc?[title,desc.substring(0,500)]:[title];
  try{
    document.getElementById("prog-text").textContent="구글 번역 실행 중...";
    let done=0;
    const gr=await Promise.all(LANGS.map(async(lang)=>{
      try{
        const r=await fetch(`https://translation.googleapis.com/language/translate/v2?key=${GK}`,
          {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({q:texts,target:lang.c,format:"text"})});
        const d=await r.json();
        if(d.error)return{lang,title:"",desc:""};
        const tr=d.data.translations;
        done++;document.getElementById("progress-bar").style.width=Math.round(done/LANGS.length*50)+"%";
        return{lang,title:tr[0]?.translatedText||"",desc:desc?tr[1]?.translatedText||"":""};
      }catch(e){return{lang,title:"",desc:""};}
    }));
    const gt=((Date.now()-st)/1000).toFixed(1);
    document.getElementById("prog-text").textContent=`구글 번역 완료 (${gt}초) → AI 맥락 최적화 중...`;
    document.getElementById("progress-bar").className="progress-bar-fill bar-claude";
    document.getElementById("progress-bar").style.width="50%";
    gr.forEach(({lang,title:t,desc:d})=>{AR[lang.c]={lang,gTitle:t,gDesc:d,cTitle:"",cAlt:"",keywords:"",tags:[]};});
    const cd={count:0,total:LANGS.length};
    await Promise.all(CB.map(async(codes)=>{
      const vc=codes.filter(c=>AR[c]&&AR[c].gTitle);if(!vc.length)return;
      const li=vc.map(c=>{const r=AR[c];return `${c}(${r.lang.n}): title="${r.gTitle}"${r.gDesc?`, desc="${r.gDesc.substring(0,120)}"`:""}`}).join("\n");
      const prompt=`Expert creator localizer for ${pname}. Google translated. Now optimize:
1. Title for CTR/cultural appeal — STRICT MAX 100 characters (count carefully)
2. Alt title for A/B test — also MAX 100 characters
3. 10 local SEO keywords (space-separated)
4. ${pname==="YouTube"?"5-7 SEO tags":pname==="TikTok"?"3-5 hashtags":"8-10 hashtags"}
RULES: Keep structure. No added content. Preserve brands. TITLE MUST BE UNDER 100 CHARS.
Languages:\n${li}\nSource: "${title}"
JSON only: {${vc.map(c=>`"${c}":{"title":"","title_alt":"","keywords":"","tags":[]}`).join(",")}}`;
      try{
        const r=await fetch("/api/claude",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:prompt}]})
        });
        const data=await r.json();
        let raw=(data.content||[]).map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
        const res=JSON.parse(raw);
        vc.forEach(c=>{
          if(res[c]&&AR[c]){
            // ★ 생성 후 100자 초과시 즉시 절단
            let ct=res[c].title||AR[c].gTitle;
            if(ct.length>100)ct=ct.substring(0,97)+"...";
            let ca=res[c].title_alt||"";
            if(ca.length>100)ca=ca.substring(0,97)+"...";
            AR[c].cTitle=ct;AR[c].cAlt=ca;
            AR[c].keywords=res[c].keywords||"";AR[c].tags=res[c].tags||[];
          }
          cd.count++;
          document.getElementById("progress-bar").style.width=(50+Math.round(cd.count/cd.total*50))+"%";
          document.getElementById("prog-text").textContent=`AI 맥락 최적화 중... ${cd.count}/${cd.total}개국`;
        });
      }catch(e){vc.forEach(c=>{if(AR[c])AR[c].cTitle=AR[c].gTitle;cd.count++;});}
    }));
    clearInterval(ti);
    const tt=((Date.now()-st)/1000).toFixed(1);
    document.getElementById("timer").textContent=tt+"초 완료!";
    document.getElementById("progress-bar").style.width="100%";
    document.getElementById("prog-text").textContent=`${Object.keys(AR).length}개국 완료`;
    document.getElementById("results").style.display="block";
    document.getElementById("results-title").textContent=`번역 완료 — ${Object.keys(AR).length}개국 / ${tt}초`;
    const grid=document.getElementById("results-grid");
    LANGS.forEach(lang=>{
      const r=AR[lang.c];if(!r||!r.gTitle)return;
      const row=document.createElement("div");row.className="lang-row";
      const id="r_"+lang.c.replace(/[^a-zA-Z0-9]/g,"_");row.id=id;
      const tags=(r.tags||[]).map(t=>`<span class="lang-tag">${t.startsWith("#")?t:"#"+t}</span>`).join("");
      row.innerHTML=`<div class="lang-name"><span class="lang-flag">${lang.f}</span>${lang.n}</div>
        <div class="lang-content">
          <div class="lang-title">${esc(r.cTitle||r.gTitle)}<span class="ctx-badge">맥락</span><span class="ok-badge" id="ob_${id}">✓ 등록됨</span></div>
          ${r.cAlt?`<div class="lang-title-alt">↳ ${esc(r.cAlt)}</div>`:""}
          ${r.gDesc?`<div class="lang-desc">${esc(r.gDesc.substring(0,150))}${r.gDesc.length>150?"...":""}</div>`:""}
          ${r.keywords?`<div class="lang-kw">🔑 ${esc(r.keywords)}</div>`:""}
          ${tags?`<div class="lang-tags">${tags}</div>`:""}
        </div>
        <button class="copy-btn" onclick="copyRow('${id}')">복사</button>`;
      grid.appendChild(row);
    });
    const sb=document.getElementById("status-box");
    sb.className="status-box ok";sb.textContent=`✓ 완료 — ${Object.keys(AR).length}개국 / 총 ${tt}초`;sb.style.display="block";
    if(AT){document.getElementById("btn-apply").style.display="flex";}
  }catch(e){
    clearInterval(ti);
    const sb=document.getElementById("status-box");sb.className="status-box err";sb.textContent="오류: "+e.message;sb.style.display="block";
  }
  btn.disabled=false;document.getElementById("btn-lbl").textContent="70개국 동시 번역 실행";
}

async function applyYT(){
  const url=document.getElementById("inp-url").value.trim();
  const vid=url.match(/[?&]v=([^&]+)/)?.[1];
  if(!vid){alert("URL 칸에 YouTube 영상 주소를 입력해주세요.");return;}
  if(!AT){alert("YouTube 로그인이 필요합니다.");return;}
  const btn=document.getElementById("btn-apply");
  btn.disabled=true;
  document.getElementById("apply-lbl").innerHTML='<div class="spinner"></div> 등록 중...';
  document.getElementById("progress-bar").className="progress-bar-fill bar-apply";
  document.getElementById("progress-area").style.display="block";
  document.getElementById("progress-bar").style.width="0%";
  const sb=document.getElementById("status-box");
  sb.className="status-box ok";sb.style.display="block";

  // 진단 로그 출력 영역
  const logLines=[];
  function log(msg){logLines.push(msg);console.log(msg);sb.textContent=logLines.slice(-3).join(" → ");}

  const YT_SAFE=new Set([
    // 확인된 63개국
    "ko","en","fr","de","es","it","pt-BR","ru","nl","pl","sv",
    "da","fi","el","cs","sk","hu","ro","bg","hr",
    "sr","uk","sq","et","lv","lt","ja","zh-Hans","zh-Hant",
    "ar","hi","tr","vi","th","id","ms","fil","bn","ur","fa",
    "iw","ta","te","ml","kn","pa","mn","kk","uz","az","ka","hy",
    "my","km","si","sw","ca","cy","ga","af","ne","sl","mk",
    // 테스트 예정 추가 코드
    "is",   // 아이슬란드어 (no 대신 교체)
    "lo",   // 라오어
    "am",   // 암하라어
    "zu",   // 줄루어
    "yo",   // 요루바어
    "ha",   // 하우사어
  ]);

  try{
    log("영상 정보 가져오는 중...");
    const getResp=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=localizations,snippet&id=${vid}`,{headers:{"Authorization":"Bearer "+AT}});
    const getData=await getResp.json();
    if(getData.error)throw new Error("영상 조회 오류: "+getData.error.message);
    if(!getData.items||!getData.items[0])throw new Error("영상을 찾을 수 없습니다.");
    const sn=getData.items[0].snippet;
    document.getElementById("progress-bar").style.width="15%";
    log(`영상 확인: "${sn.title}"`);

    // 데이터 구성
    const korTitle=document.getElementById("inp-title").value.trim();
    const korDesc=document.getElementById("inp-desc").value.trim();
    const locTitle={}; // 제목만
    const locFull={};  // 제목+설명문
    locTitle["ko"]={title:ytTitle(korTitle),description:" "};
    locFull["ko"]={title:ytTitle(korTitle),description:ytDesc(korDesc)};
    Object.entries(AR).forEach(([code,r])=>{
      const t=(r.cTitle||r.gTitle||"").trim();
      if(!t)return;
      const yc=YT_CODE_MAP[code];
      if(!yc||!YT_SAFE.has(yc))return;
      locTitle[yc]={title:ytTitle(t),description:" "};
      locFull[yc]={title:ytTitle(t),description:ytDesc(r.gDesc)};
    });

    const baseSnippet={
      title:ytTitle(sn.title),
      description:ytDesc(korDesc||sn.description), // ★ 입력한 한국어 설명문 우선
      categoryId:String(sn.categoryId||"22"),
      defaultLanguage:"ko",
      tags:Array.isArray(sn.tags)?sn.tags:[]
    };
    const totalLangs=Object.keys(locTitle).length;

    // ━━━━━ STEP 1: 5개국 제목만 ━━━━━
    document.getElementById("progress-bar").style.width="25%";
    const TEST5=["ko","en","fr","es","ja"];
    const loc5={};TEST5.forEach(k=>{if(locTitle[k])loc5[k]=locTitle[k];});
    log(`STEP1: 5개국 제목 테스트 (${TEST5.join(",")})`);
    let res=await tryPut(vid,baseSnippet,loc5,AT);
    if(!res.ok){
      sb.className="status-box err";
      sb.innerHTML=`❌ STEP1 실패 — snippet 자체 문제<br><small>오류: ${res.err}<br>제목길이: ${Object.entries(loc5).map(([k,v])=>`${k}:${v.title.length}자`).join(", ")}</small>`;
      btn.disabled=false;document.getElementById("apply-lbl").textContent="▶ YouTube 자막탭 자동 등록";
      return;
    }
    log(`✓ STEP1 성공`);
    document.getElementById("progress-bar").style.width="40%";

    // ━━━━━ STEP 2: 전체 제목만 ━━━━━
    log(`STEP2: 전체 ${totalLangs}개국 제목 테스트`);
    res=await tryPut(vid,baseSnippet,locTitle,AT);
    if(!res.ok){
      // 실패 언어 진단: 1개씩 테스트
      const badCodes=[];
      const goodCodes=["ko","en","fr","es","ja"];
      const remaining=Object.keys(locTitle).filter(k=>!goodCodes.includes(k));
      log(`STEP2 실패 → 문제 언어코드 찾는 중...`);
      for(const code of remaining){
        const testLoc={};
        [...goodCodes,code].forEach(k=>{if(locTitle[k])testLoc[k]=locTitle[k];});
        const sr=await tryPut(vid,baseSnippet,testLoc,AT);
        if(sr.ok){goodCodes.push(code);}
        else{badCodes.push(code);console.warn("❌ 거부된 언어코드:",code);}
      }
      // 통과된 코드로 최종 등록
      const locGood={};goodCodes.forEach(k=>{if(locTitle[k])locGood[k]=locTitle[k];});
      await tryPut(vid,baseSnippet,locGood,AT);
      document.getElementById("progress-bar").style.width="100%";
      sb.className="status-box err";
      sb.innerHTML=`⚠ 전체 제목 ${goodCodes.length}개국 등록 완료<br>`
        +`<small>❌ YouTube가 거부한 언어코드: <b>${badCodes.join(", ")||"없음"}</b><br>`
        +`✓ 통과된 코드: ${goodCodes.join(", ")}</small>`;
      btn.disabled=false;document.getElementById("apply-lbl").textContent="▶ YouTube 자막탭 자동 등록";
      return;
    }
    log(`✓ STEP2 성공`);
    document.getElementById("progress-bar").style.width="65%";

    // ━━━━━ STEP 3: 전체 제목+설명문 ━━━━━
    // 설명문 샘플 디버그 — 화면에 직접 표시
    const sampleCodes=["es","en","fr","ja","de"];
    const descSamples=sampleCodes.map(c=>
      locFull[c]?`${c}: "${(locFull[c].description||"").substring(0,40)}"`:""
    ).filter(Boolean).join("\n");
    sb.innerHTML=`STEP3 직전 설명문 내용 확인:<br><small style="font-family:monospace;white-space:pre">${descSamples.replace(/\n/g,"<br>")}</small>`;
    await new Promise(r=>setTimeout(r,3000)); // 3초 표시
    // 설명문이 실제로 있는지 확인
    const hasDesc=Object.values(locFull).some(v=>v.description&&v.description.trim().length>1);
    if(!hasDesc){
      sb.className="status-box err";
      sb.innerHTML=`⚠ 설명문 데이터 없음 — 번역 실행 시 설명문을 입력했는지 확인하세요<br>`
        +`<small>현재 모든 언어의 설명문이 비어 있습니다.</small>`;
      btn.disabled=false;document.getElementById("apply-lbl").textContent="▶ YouTube 자막탭 자동 등록";
      return;
    }
    log(`STEP3: 전체 ${totalLangs}개국 제목+설명문 등록`);
    res=await tryPut(vid,baseSnippet,locFull,AT);
    if(!res.ok){
      sb.className="status-box err";
      sb.innerHTML=`❌ STEP3 실패 — 설명문 포함 등록 거부됨<br>`
        +`<small>오류: <b>${res.err}</b><br>`
        +`샘플 설명문(en): "${(locFull["en"]?.description||"").substring(0,80)}"<br>`
        +`샘플 설명문(es): "${(locFull["es"]?.description||"").substring(0,80)}"</small>`;
      btn.disabled=false;document.getElementById("apply-lbl").textContent="▶ YouTube 자막탭 자동 등록";
      return;
    }

    // ━━━━━ 전체 완료 — GET으로 실제 저장 검증 ━━━━━
    document.getElementById("progress-bar").style.width="100%";
    log("GET으로 실제 저장 검증 중...");
    const verify=await verifyGet(vid,AT);
    sb.className="status-box ok";
    sb.innerHTML=`✅ YouTube ${verify.count}개국 제목+설명문 등록 완료!<br>`
      +`<small>등록 언어: ${verify.sample}${verify.count>5?" 외 "+(verify.count-5)+"개":""}</small>`;
    Object.keys(AR).forEach(c=>{const o=document.getElementById("ob_r_"+c.replace(/[^a-zA-Z0-9]/g,"_"));if(o)o.style.display="inline-flex";});

  }catch(e){
    sb.className="status-box err";sb.textContent="오류: "+e.message;sb.style.display="block";
  }
  btn.disabled=false;document.getElementById("apply-lbl").textContent="▶ YouTube 자막탭 자동 등록";
}

async function tryPut(vid,snippet,localizations,token){
  try{
    const resp=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,localizations`,{
      method:"PUT",
      headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({kind:"youtube#video",id:vid,snippet,localizations})
    });
    const data=await resp.json();
    if(data.error)return{ok:false,err:data.error.errors?.[0]?.reason||data.error.message};
    // PUT 응답에서 실제 저장된 localizations 수 확인
    const savedCount=Object.keys(data.localizations||{}).length;
    return{ok:true,savedCount,data};
  }catch(e){return{ok:false,err:e.message};}
}

// PUT 후 GET으로 실제 저장 검증
async function verifyGet(vid,token){
  try{
    const resp=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=localizations,snippet&id=${vid}`,{
      headers:{"Authorization":"Bearer "+token}
    });
    const data=await resp.json();
    const loc=data.items?.[0]?.localizations||{};
    const codes=Object.keys(loc);
    // 설명문 샘플: en, es, fr 중 있는 것
    let descSample="";
    for(const c of["en","es","fr","ja"]){
      if(loc[c]?.description&&loc[c].description.trim().length>1){
        descSample=`${c}: "${loc[c].description.substring(0,50)}"`;
        break;
      }
    }
    if(!descSample)descSample="모든 언어 설명문 비어있음 ← 문제!";
    return{count:codes.length,codes,sample:codes.slice(0,5).join(", "),descSample};
  }catch(e){return{count:0,codes:[],sample:"확인 실패",descSample:"오류: "+e.message};}
}

// HTML 엔티티 디코딩 + YouTube 필드 정제
function decodeHtml(s){
  if(!s||!s.trim())return" ";
  const txt=document.createElement("textarea");
  txt.innerHTML=s;
  let decoded=txt.value;
  decoded=decoded.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,"").trim();
  return decoded||" ";
}
// YouTube title: 최대 100자, 제어문자 금지, 빈값 금지
function ytTitle(s){
  let t=decodeHtml(s);
  // 100자 초과시 97자+... 로 자르기
  if(t.length>100)t=t.substring(0,97)+"...";
  return t||"(제목 없음)";
}
// YouTube description: 최대 4900자
function ytDesc(s){
  let d=decodeHtml(s);
  if(d.length>4900)d=d.substring(0,4900);
  return d||" ";
}

function copyRow(id){
  const lc=Object.keys(AR).find(k=>k.replace(/[^a-zA-Z0-9]/g,"_")===id.replace("r_",""));
  const r=lc?AR[lc]:null;if(!r)return;
  const parts=[r.lang.n,r.cTitle||r.gTitle];
  if(r.gDesc)parts.push(r.gDesc);if(r.keywords)parts.push(r.keywords);if(r.tags&&r.tags.length)parts.push(r.tags.join(" "));
  navigator.clipboard.writeText(parts.join("\n")).then(()=>{const b=document.querySelector("#"+id+" .copy-btn");if(b){b.textContent="복사됨!";setTimeout(()=>b.textContent="복사",1500)}});
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
